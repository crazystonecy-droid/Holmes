<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>夜城神探：午夜追凶</title>
    
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@5.3.12/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-spine@2.1.14/dist/pixi-spine.js"></script>
    
    <!-- 引入外部关卡配置，带上版本号防缓存 -->
    <script src="./levels.js?v=1.0.4"></script> 

    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            font-family: -apple-system, "Segoe UI", sans-serif; 
        }

        body { background-color: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; touch-action: none; overscroll-behavior: none; }

        #app { 
            width: 100%; height: 100vh; max-width: 580px; position: relative; 
            background-color: #000; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #cg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        #building-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 2; display: flex; flex-direction: column;
            transform: translateY(100%); 
            will-change: transform;
            background: url('./img/bg1.png') center bottom / 100% auto no-repeat transparent;
        }

        /* 悬浮UI层 */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; 
        }

        /* 专用于播放胜利/失败等全屏特效动画的层 */
        #spine-ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 101; pointer-events: none; 
        }
        
        .ui-anim {
            pointer-events: auto; 
            transform: translateY(-150px);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease-out;
        }
        
        .ui-anim.show {
            transform: translateY(0);
            opacity: 1;
        }

        .top-ui { position: relative; display: flex; justify-content: space-between; align-items: flex-start; padding: 15px 20px 5px; }
        .coin-pill { border: 2px solid #ebd160; border-radius: 8px; padding: 4px 10px; font-size: 13px; color: #ebd160; font-weight: bold; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .level-title { font-size: 22px; color: #fff; font-weight: bold; margin-bottom: 4px; text-align: center; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);}
        .hearts-container { display: flex; justify-content: center; gap: 4px; }
        .heart { color: #d96880; font-size: 16px; transition: 0.2s; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));}
        .hint-btn { border: 2px solid #74c2f2; border-radius: 8px; padding: 4px 10px; font-size: 13px; color: #74c2f2; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); cursor: pointer;}

        .rules-wrapper { position: relative; width: 90%; margin: 15px auto 40px; }
        .rules-container { background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.2); display: flex; align-items: center; padding: 12px 5px; }
        .rule-item { flex: 1; text-align: center; font-size: 12px; color: #444; line-height: 1.4; font-weight: 500;}
        .rule-hl { color: #1a73e8; font-weight: bold; font-size: 14px; margin: 0 2px;}
        .rule-divider { width: 1px; height: 30px; background: #e5e5e5; }
        
        .counter-pill { position: absolute; bottom: -26px; left: 50%; transform: translateX(-50%); background: #ffffff; border-radius: 20px; padding: 4px 16px; font-size: 13px; font-weight: bold; color: #555; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border: 2px solid rgba(255,255,255,0.8); display: flex; align-items: center; gap: 5px; white-space: nowrap; }
        .counter-red { color: #ea4335; font-size: 16px; }

        @keyframes attentionJump { 0%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } 50% { transform: translateY(0); } 70% { transform: translateY(-5px); } }
        .attention-jump { animation: attentionJump 0.8s cubic-bezier(0.25, 1, 0.5, 1); }

        .main-interaction-area { flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 5; padding-bottom: 10px; }
        
        .board-wrapper { width: 80%; max-width: 580px; position: relative; margin-bottom: 25px; }
        #pixi-canvas-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 1; }
        .grid { display: grid; position: relative; z-index: 2; touch-action: none; }
        .cell { aspect-ratio: 82 / 116; border-radius: 2px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; background: transparent; transition: transform 0.12s cubic-bezier(0.25, 1, 0.5, 1); transform-origin: center center; }

        @keyframes popIn { 0% { transform: scale(0.3); opacity: 0; } 70% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .mark-x { color: #ffffff; font-weight: 900; font-family: sans-serif; line-height: 1; opacity: 1; animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 2px 4px rgba(0,0,0,0.8); pointer-events: none;}
        .mark-error { color: #ff0000; font-weight: 900; font-family: sans-serif; line-height: 1; background: transparent; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; text-shadow: 0 0 15px rgba(255,0,0,0.8), 0 2px 4px rgba(0,0,0,0.8); }

        .confetti-particle { position: absolute; width: 8px; height: 16px; border-radius: 2px; z-index: 50; pointer-events: none; animation: blast 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }
        @keyframes blast { 0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0.6) rotate(var(--rot)); opacity: 0; } }

        .controls-guide { width: 85%; display: flex; justify-content: space-around; margin-bottom: 10px;}
        .guide-item { display: flex; flex-direction: column; align-items: center; color: #eaeaea; font-size: 12px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);}
        .guide-box { width: 44px; height: 44px; background: rgba(30, 25, 34, 0.8); backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 20px; margin-bottom: 4px; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.4);}
        .guide-item span { color: #ebd160; font-weight: bold; margin-top: 2px; }

        .version-tag { position: absolute; bottom: 5px; right: 10px; color: rgba(255,255,255,0.3); font-size: 11px; z-index: 100; pointer-events: none; }

        @media (max-height: 700px) {
            .top-ui { padding-top: 10px; }
            .rules-wrapper { margin-bottom: 28px; }
            .board-wrapper { width: 72%; margin-bottom: 15px; } 
            #pixi-canvas-container { top: 0; left: 0; right: 0; bottom: 0; }
            .guide-box { width: 38px; height: 38px; font-size: 16px; }
            .controls-guide { transform: scale(0.95); margin-bottom: 5px; }
        }

        /* 结算界面通用样式 */
        .end-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20, 20, 25, 0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .end-title { font-size: 36px; font-weight: bold; margin-bottom: 15px; letter-spacing: 2px;}
        .big-icon { font-size: 80px; margin-bottom: 25px; } 
        .v-btn { border: none; padding: 15px 45px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 30px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);}
    </style>
</head>
<body>

<div id="app">
    <!-- 底层 CG 画布 -->
    <div id="cg-layer"></div>

    <!-- 顶层 全屏特效画布 (胜利、失败动画专用) -->
    <div id="spine-ui-layer"></div>

    <!-- 楼房建筑与窗户网格层 -->
    <div id="building-layer">
        <!-- 排版占位 -->
        <div class="top-ui" style="opacity: 0; pointer-events: none; visibility: hidden;">
            <div class="coin-pill">占位</div>
            <div><div class="level-title">占位</div><div class="hearts-container"><span class="heart">❤️</span></div></div>
            <div class="hint-btn">占位</div>
        </div>
        <div class="rules-wrapper" style="opacity: 0; pointer-events: none; visibility: hidden;">
            <div class="rules-container" style="padding: 12px 5px;"><div class="rule-item">占位<br>占位</div></div>
        </div>
        
        <div class="main-interaction-area">
            <div class="board-wrapper">
                <div id="pixi-canvas-container"></div>
                <div class="grid" id="grid"></div>
            </div>

            <div class="controls-guide">
                <div class="guide-item"><div class="guide-box">👆</div><div>点击/滑动</div><span>排查 ×</span></div>
                <div class="guide-item"><div class="guide-box">✌️</div><div>双击破门</div><span>抓捕 🦹</span></div>
            </div>
        </div>
    </div>

    <!-- 动画 UI 层 -->
    <div id="ui-layer">
        <div class="top-ui">
            <div class="coin-pill ui-anim anim-group-1">💵 <span id="total-coins">1400</span></div>
            <div class="center-group ui-anim anim-group-2">
                <div class="level-title" id="level-display">加载中...</div>
                <div class="hearts-container" id="hearts-container">
                    <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
                </div>
            </div>
            <div class="hint-btn ui-anim anim-group-1" onclick="alert('【高级探员推理指南】\n1. 找小方块：只占1个窗户的颜色区域必藏罪犯！\n2. 抽屉原理：如果某两行只剩下红蓝两种颜色，那么红蓝罪犯必在这两行，其它地方的红蓝窗户直接打×！\n\n【操作指南】\n按住屏幕滑动：批量排查\n双击窗户：破门抓捕')">💡 线索</div>
        </div>

        <div class="rules-wrapper ui-anim anim-group-3" id="rules-panel">
            <div class="rules-container">
                <div class="rule-item">每种颜色<br><span class="rule-hl">1</span>名罪犯</div>
                <div class="rule-divider"></div>
                <div class="rule-item">每行每列仅<br>有<span class="rule-hl">1</span>名罪犯</div>
                <div class="rule-divider"></div>
                <div class="rule-item">罪犯不能相<br>邻躲藏</div>
            </div>
            <div class="counter-pill">
                🦹 剩余罪犯: <span class="counter-red" id="thief-counter">0</span>
            </div>
        </div>
    </div>

    <!-- ==================== 胜利结算界面 ==================== -->
    <div id="victory-screen" class="end-screen">
        <div class="end-title" style="color: #74c2f2; transform: translateY(-100px);">抓捕成功</div>
        
        <div class="big-icon" style="visibility: hidden; margin: 0; height: 40px;">🕵️‍♂️</div>
        
        <div style="transform: translateY(100px); display: flex; flex-direction: column; align-items: center; gap: 20px;">
            <div class="coin-pill" style="font-size: 20px; padding: 10px 25px; background: rgba(0,0,0,0.8); border-width: 3px;">赏金入账 +200</div>
            <button class="v-btn" style="background: #ebd160; color: #2f2331;" onclick="nextLevel()">前往下个街区</button>
        </div>
    </div>

    <!-- ==================== 失败结算界面 ==================== -->
    <div id="fail-screen" class="end-screen">
        <!-- 标题向上偏移 150px (在原先100px基础上再移50px) -->
        <div class="end-title" style="color: #ea4335; transform: translateY(-150px);">抓捕失败</div>
        
        <div class="big-icon" style="visibility: hidden; margin: 0; height: 40px;">❌</div>
        
        <!-- 按钮向下偏移 200px (在原先100px基础上再移100px) -->
        <button class="v-btn" style="background: #ea4335; color: #fff; transform: translateY(200px);" onclick="retryLevel()">重新开始</button>
    </div>

    <div class="version-tag" id="v-tag">v1.0.4</div>
</div>

<script>
    // ==========================================
    // 游戏版本号
    // ==========================================
    const GAME_VERSION = "1.0.4";
    document.getElementById('v-tag').innerText = "v" + GAME_VERSION;

    let currentSessionId = 0;

    window.addEventListener('error', function(event) {
        if (event.message && event.message.includes('Region not found')) {
            alert(`⚠️ 动画加载警告！\n检测到缺失贴图: \n${event.message}\n已强行跳过。`);
            document.getElementById('building-layer').style.transition = 'transform 0.5s ease-out';
            document.getElementById('building-layer').style.transform = 'translateY(0)';
            document.querySelectorAll('.ui-anim').forEach(el => el.classList.add('show'));
        }
    });

    let currentLevelIndex = 0;
    let currentLevel;
    let currentGridSize = 6; 
    let playerState;
    let lives;
    let thievesRemaining;
    let totalCoins = 1400;

    let availableFailAnims =[];
    const gridEl = document.getElementById('grid');

    function tweenSpineScale(spine, targetScale, durationMs) {
        if (!spine || !spine.baseScale || !pixiApp) return;
        let startScale = spine.scale.x;
        let startTime = performance.now();
        if (spine.tweenTicker) pixiApp.ticker.remove(spine.tweenTicker);
        spine.tweenTicker = () => {
            let now = performance.now();
            let progress = (now - startTime) / durationMs;
            if (progress >= 1) {
                spine.scale.set(targetScale);
                pixiApp.ticker.remove(spine.tweenTicker);
                spine.tweenTicker = null;
            } else {
                let easeProgress = progress * (2 - progress);
                let currentScale = startScale + (targetScale - startScale) * easeProgress;
                spine.scale.set(currentScale);
            }
        };
        pixiApp.ticker.add(spine.tweenTicker);
    }

    function bounceCell(r, c) {
        const index = r * currentGridSize + c;
        const cell = gridEl.children[index];
        const wSpine = windowInstances[index];
        const pSpine = peopleInstances[index];
        
        cell.style.transform = 'scale(0.85)';
        if (wSpine && wSpine.baseScale) {
            tweenSpineScale(wSpine, wSpine.baseScale * 0.85, 100);
            if (pSpine) tweenSpineScale(pSpine, wSpine.baseScale * 0.85, 100);
        }
        setTimeout(() => {
            cell.style.transform = 'scale(1)';
            if (wSpine && wSpine.baseScale) {
                tweenSpineScale(wSpine, wSpine.baseScale, 150);
                if (pSpine) tweenSpineScale(pSpine, wSpine.baseScale, 150);
            }
        }, 120);
    }

    let isDragging = false;
    let dragMode = null; 
    let hasDragged = false;
    let dragStartPos = { x: 0, y: 0 };
    let lastPaintedCell = null;
    let lastTapTime = 0;
    let lastTapCell = null;

    gridEl.addEventListener('pointerdown', handlePointerDown);
    document.addEventListener('pointermove', handlePointerMove, {passive: false});
    document.addEventListener('pointerup', handlePointerUp);
    document.addEventListener('pointercancel', handlePointerUp);

    function handlePointerDown(e) {
        if (lives <= 0) return;
        const cell = e.target.closest('.cell');
        if (!cell) return;
        
        const r = parseInt(cell.dataset.r);
        const c = parseInt(cell.dataset.c);
        let state = playerState[r][c];
        const currentCellID = `${r}-${c}`;

        if (state === 2 || state === 4) return; 

        bounceCell(r, c);

        const currentTime = new Date().getTime();
        const isDoubleTap = (currentTime - lastTapTime < 300) && (lastTapCell === currentCellID);

        if (isDoubleTap) {
            isDragging = false; 
            lastTapTime = 0; 
            lastTapCell = null;
            executeDoubleTapAction(r, c);
            return;
        }

        isDragging = true;
        hasDragged = false;
        dragStartPos = { x: e.clientX, y: e.clientY };
        lastPaintedCell = currentCellID;
        lastTapTime = currentTime;
        lastTapCell = currentCellID;

        if (state === 0) {
            dragMode = 1;
            playerState[r][c] = 1;
        } else if (state === 1 || state === 3) {
            dragMode = 0;
            playerState[r][c] = 0;
        }
        updateBoardView(); 
    }

    function handlePointerMove(e) {
        if (!isDragging) return;
        e.preventDefault();

        const dx = e.clientX - dragStartPos.x;
        const dy = e.clientY - dragStartPos.y;
        
        if (!hasDragged && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
            hasDragged = true;
            lastTapTime = 0; 
        }

        if (hasDragged) {
            const el = document.elementFromPoint(e.clientX, e.clientY);
            const cell = el ? el.closest('.cell') : null;
            
            if (cell && cell.parentElement === gridEl) {
                const r = parseInt(cell.dataset.r);
                const c = parseInt(cell.dataset.c);
                const cellID = `${r}-${c}`;
                
                if (cellID !== lastPaintedCell) {
                    paintCell(r, c, dragMode);
                    lastPaintedCell = cellID;
                    bounceCell(r, c);
                }
            }
        }
    }

    function handlePointerUp(e) { isDragging = false; }

    function paintCell(r, c, targetState) {
        let state = playerState[r][c];
        if (state === 2 || state === 4) return; 
        if (targetState === 1 && state === 0) {
            playerState[r][c] = 1; updateBoardView();
        } else if (targetState === 0 && (state === 1 || state === 3)) {
            playerState[r][c] = 0; updateBoardView();
        }
    }

    let cgApp, uiApp;
    let cgInstances =[]; 
    let currentCgInstance = null; 
    let victorySpineInstance = null;
    let failSpineInstance = null;
    
    let pixiApp;
    let windowContainer, peopleContainer;
    let windowPools =[]; 
    let windowInstances =[]; 
    let peopleInstances =[]; 

    function getAnimDuration(spine, animName) {
        if (!spine || !spine.spineData) return 0.5;
        const anim = spine.spineData.findAnimation(animName);
        return anim ? anim.duration : 0.5;
    }

    function safePlaySpine(spine, track, animName, loop, delay = 0) {
        if (!spine || !spine.spineData) return;
        if (spine.spineData.findAnimation(animName)) {
            if (delay === -1) spine.state.setAnimation(track, animName, loop);
            else spine.state.addAnimation(track, animName, loop, delay);
        }
    }

    function initPixiAndSpine() {
        const container = document.getElementById('pixi-canvas-container');
        pixiApp = new PIXI.Application({ transparent: true, resizeTo: container, autoDensity: true, resolution: window.devicePixelRatio || 1 });
        container.appendChild(pixiApp.view);

        const cgContainer = document.getElementById('cg-layer');
        cgApp = new PIXI.Application({ transparent: true, resizeTo: cgContainer, autoDensity: true, resolution: window.devicePixelRatio || 1 });
        cgContainer.appendChild(cgApp.view);

        // 初始化顶层特效画布
        const uiContainer = document.getElementById('spine-ui-layer');
        uiApp = new PIXI.Application({ transparent: true, resizeTo: uiContainer, autoDensity: true, resolution: window.devicePixelRatio || 1 });
        uiContainer.appendChild(uiApp.view);

        peopleContainer = new PIXI.Container();
        windowContainer = new PIXI.Container();
        pixiApp.stage.addChild(peopleContainer); 
        pixiApp.stage.addChild(windowContainer); 

        const loader = PIXI.Loader.shared;
        loader.defaultQueryString = 'v=' + GAME_VERSION;

        SPINE_CONFIG.cgUrls.forEach((url, index) => { loader.add(`cgSpine_${index}`, url); });
        SPINE_CONFIG.windowUrls.forEach((url, index) => { loader.add(`windowSpine_${index}`, url); });
        loader.add('peopleSpine', SPINE_CONFIG.peopleUrl);
        
        loader.add('victorySpine', './AN/victory/victory.json');
        loader.add('failSpine', './AN/fail/fail.json');

        loader.load((loader, resources) => {
            SPINE_CONFIG.cgUrls.forEach((url, index) => {
                try {
                    let cgData = resources[`cgSpine_${index}`].spineData;
                    if (cgData) {
                        let cgSpine = new PIXI.spine.Spine(cgData);
                        cgSpine.visible = false;
                        cgApp.stage.addChild(cgSpine);
                        cgInstances.push(cgSpine);
                    }
                } catch(e) {}
            });

            try {
                if (resources.victorySpine && resources.victorySpine.spineData) {
                    victorySpineInstance = new PIXI.spine.Spine(resources.victorySpine.spineData);
                    victorySpineInstance.visible = false;
                    uiApp.stage.addChild(victorySpineInstance);
                }
            } catch(e) { console.error("Victory动画加载失败", e); }
            
            try {
                if (resources.failSpine && resources.failSpine.spineData) {
                    failSpineInstance = new PIXI.spine.Spine(resources.failSpine.spineData);
                    failSpineInstance.visible = false;
                    uiApp.stage.addChild(failSpineInstance);
                }
            } catch(e) { console.error("Fail动画加载失败", e); }

            const peopleData = resources.peopleSpine && resources.peopleSpine.spineData;
            
            SPINE_CONFIG.windowUrls.forEach((url, index) => {
                let pool =[];
                try {
                    let wData = resources[`windowSpine_${index}`].spineData;
                    if (wData) {
                        for (let i = 0; i < 100; i++) {
                            const wSpine = new PIXI.spine.Spine(wData);
                            wSpine.visible = false; windowContainer.addChild(wSpine); pool.push(wSpine);
                        }
                        windowPools.push(pool);
                    }
                } catch(e) {}
            });

            if (peopleData) {
                for (let i = 0; i < 100; i++) {
                    const pSpine = new PIXI.spine.Spine(peopleData);
                    pSpine.visible = false; peopleInstances.push(pSpine); peopleContainer.addChild(pSpine);
                }
            }

            const resizeObserver = new ResizeObserver(() => {
                if (pixiApp) pixiApp.resize();
                if (cgApp) cgApp.resize();
                if (uiApp) uiApp.resize();
                updateSpinePositions();
            });
            resizeObserver.observe(gridEl);
            
            loadLevel(0);
        });
    }

    function updateSpinePositions() {
        cgInstances.forEach(cg => {
            cg.x = cgApp.screen.width / 2; cg.y = cgApp.screen.height; 
            let scale = cgApp.screen.width / 750; cg.scale.set(scale);
        });

        // 适配顶层特效居中
        if (victorySpineInstance && uiApp) {
            victorySpineInstance.x = uiApp.screen.width / 2;
            victorySpineInstance.y = uiApp.screen.height / 2;
            let scale = uiApp.screen.width / 750;
            victorySpineInstance.scale.set(scale);
        }
        if (failSpineInstance && uiApp) {
            failSpineInstance.x = uiApp.screen.width / 2;
            failSpineInstance.y = uiApp.screen.height / 2;
            let scale = uiApp.screen.width / 750;
            failSpineInstance.scale.set(scale);
        }

        if (!pixiApp || windowInstances.length === 0) return;
        const container = document.getElementById('pixi-canvas-container');
        const containerRect = container.getBoundingClientRect();
        const cells = gridEl.children;
        const totalCells = currentGridSize * currentGridSize;
        if (cells.length < totalCells) return; 

        for (let i = 0; i < totalCells; i++) {
            const cell = cells[i]; const wSpine = windowInstances[i]; const pSpine = peopleInstances[i];
            const cellRect = cell.getBoundingClientRect();
            if (cellRect.width === 0) continue; 
            const x = cellRect.left - containerRect.left;
            const y = cellRect.top - containerRect.top;
            const targetScale = cellRect.width / SPINE_CONFIG.baseWidth;
            if (wSpine) wSpine.baseScale = targetScale;
            if (pSpine) pSpine.baseScale = targetScale; 
            if (wSpine) { wSpine.x = x + cellRect.width * SPINE_CONFIG.originX; wSpine.y = y + cellRect.height * SPINE_CONFIG.originY; wSpine.scale.set(targetScale); }
            if (pSpine) { pSpine.x = x + cellRect.width * SPINE_CONFIG.originX; pSpine.y = y + cellRect.height * SPINE_CONFIG.originY; pSpine.scale.set(targetScale); }
        }
    }

    function loadLevel(index) {
        currentSessionId++;
        const currentSession = currentSessionId; 

        if (index >= levelData.length) index = 0; 
        
        // 隐藏所有结算UI和特效
        document.getElementById('victory-screen').style.display = 'none';
        document.getElementById('fail-screen').style.display = 'none';
        if (victorySpineInstance) victorySpineInstance.visible = false;
        if (failSpineInstance) failSpineInstance.visible = false;

        const buildingLayer = document.getElementById('building-layer');
        buildingLayer.style.transition = 'none';
        buildingLayer.style.transform = 'translateY(100%)';

        document.querySelectorAll('.ui-anim').forEach(el => el.classList.remove('show'));
        cgInstances.forEach(cg => cg.visible = false);
        
        let slideDelay = 800; 
        if (cgInstances.length > 0) {
            let randomCgIndex = Math.floor(Math.random() * cgInstances.length);
            currentCgInstance = cgInstances[randomCgIndex];
            if (currentCgInstance && currentCgInstance.spineData.findAnimation('action')) {
                currentCgInstance.visible = true;
                currentCgInstance.state.setAnimation(0, 'action', false); 
            } else { slideDelay = 50; }
        } else { slideDelay = 50; }

        setTimeout(() => {
            if (currentSession !== currentSessionId) return;
            buildingLayer.style.transition = 'transform 0.8s cubic-bezier(0.25, 1, 0.5, 1)';
            buildingLayer.style.transform = 'translateY(0)';
            setTimeout(() => { if (currentSession === currentSessionId) document.querySelectorAll('.anim-group-1').forEach(el => el.classList.add('show')); }, 0);
            setTimeout(() => { if (currentSession === currentSessionId) document.querySelectorAll('.anim-group-2').forEach(el => el.classList.add('show')); }, 200);
            setTimeout(() => { if (currentSession === currentSessionId) document.querySelectorAll('.anim-group-3').forEach(el => el.classList.add('show')); }, 400);
        }, slideDelay);

        currentLevel = levelData[index];
        const randomBgIndex = Math.floor(Math.random() * BACKGROUND_IMAGES.length);
        const selectedBg = BACKGROUND_IMAGES[randomBgIndex] + '?v=' + GAME_VERSION;
        buildingLayer.style.background = `url('${selectedBg}') center bottom / 100% auto no-repeat transparent`;

        currentGridSize = currentLevel.solution.length;
        document.getElementById('level-display').innerText = currentLevel.title;
        
        lives = 3;
        document.querySelectorAll('.heart').forEach(h => h.style.opacity = '1');
        thievesRemaining = currentLevel.initialThief ? currentGridSize - 1 : currentGridSize;
        document.getElementById('thief-counter').innerText = thievesRemaining;

        const rulesPanel = document.getElementById('rules-panel');
        rulesPanel.classList.remove('attention-jump');
        void rulesPanel.offsetWidth; 
        rulesPanel.classList.add('attention-jump');

        availableFailAnims =['people1', 'people2', 'people3', 'people4', 'people5', 'people6', 'people7', 'people8', 'people9', 'people10'].sort(() => Math.random() - 0.5);

        playerState = Array(currentGridSize).fill().map(() => Array(currentGridSize).fill(0));
        if (currentLevel.initialThief) playerState[currentLevel.initialThief.r][currentLevel.initialThief.c] = 2;

        gridEl.style.gridTemplateColumns = `repeat(${currentGridSize}, 1fr)`;
        gridEl.style.gap = currentGridSize > 8 ? '2px' : (currentGridSize > 6 ? '4px' : '6px');

        if (windowPools.length > 0) {
            const randomStyleIndex = Math.floor(Math.random() * windowPools.length);
            windowInstances = windowPools[randomStyleIndex];
            windowPools.forEach(pool => pool.forEach(w => w.visible = false));
        }
        peopleInstances.forEach(p => p.visible = false);

        gridEl.innerHTML = '';
        for (let r = 0; r < currentGridSize; r++) {
            for (let c = 0; c < currentGridSize; c++) {
                const cell = document.createElement('div');
                cell.className = `cell`; cell.dataset.r = r; cell.dataset.c = c; gridEl.appendChild(cell);

                const spineIndex = r * currentGridSize + c;
                const wSpine = windowInstances[spineIndex];
                const pSpine = peopleInstances[spineIndex];

                if (wSpine && pSpine) {
                    wSpine.visible = true;
                    let skinColor = currentLevel.regions[r][c]; 
                    try {
                        if (skinColor <= 10) { wSpine.skeleton.setSkinByName(`window${skinColor}`); wSpine.filters =[]; } 
                        else {
                            let baseSkin = ((skinColor - 1) % 10) + 1; 
                            wSpine.skeleton.setSkinByName(`window${baseSkin}`);
                            const colorMatrix = new PIXI.filters.ColorMatrixFilter();
                            colorMatrix.hue((Math.floor((skinColor - 1) / 10) * 137.5) % 360, false);
                            wSpine.filters =[colorMatrix];
                        }
                        wSpine.skeleton.setSlotsToSetupPose();
                    } catch (e) { wSpine.filters =[]; }
                    
                    if (playerState[r][c] === 2) {
                        safePlaySpine(wSpine, 0, 'open', false, -1);
                        safePlaySpine(pSpine, 0, 'hit', true, -1); 
                        safePlaySpine(wSpine, 0, 'wait', true, 0);
                        pSpine.state.apply(pSpine.skeleton); pSpine.skeleton.updateWorldTransform();
                        pSpine.visible = true;
                    } else {
                        pSpine.visible = false;
                        safePlaySpine(wSpine, 0, 'idle', true, -1);
                    }
                }
            }
        }
        setTimeout(updateSpinePositions, 50); updateBoardView();
    }

    function executeDoubleTapAction(r, c) {
        const index = r * currentGridSize + c;
        const wSpine = windowInstances[index];
        const pSpine = peopleInstances[index];
        const currentSession = currentSessionId; 

        if (currentLevel.solution[r][c] === 1) {
            playerState[r][c] = 2; thievesRemaining--;
            if (wSpine && pSpine) {
                safePlaySpine(wSpine, 0, 'open', false, -1);
                safePlaySpine(pSpine, 0, 'people0', false, -1);
                safePlaySpine(wSpine, 0, 'wait', true, 0);
                pSpine.state.apply(pSpine.skeleton); pSpine.skeleton.updateWorldTransform();
                pSpine.visible = true;
            }
            shootConfetti(gridEl.children[index]); updateBoardView(); checkWin();
        } else {
            playerState[r][c] = 4; updateBoardView(); 
            let openDur = getAnimDuration(wSpine, 'open');
            let endDur = getAnimDuration(wSpine, 'end');
            
            if (wSpine && pSpine) {
                let failAnim = availableFailAnims.pop() || 'people1'; 
                safePlaySpine(wSpine, 0, 'open', false, -1);
                safePlaySpine(pSpine, 0, failAnim, false, -1);
                safePlaySpine(wSpine, 0, 'end', false, 0);
                safePlaySpine(wSpine, 0, 'idle', true, 0);
                pSpine.state.apply(pSpine.skeleton); pSpine.skeleton.updateWorldTransform();
                pSpine.visible = true;
            }
            setTimeout(() => {
                if (currentSession !== currentSessionId) return; 
                if (pSpine) pSpine.visible = false; 
                playerState[r][c] = 3; updateBoardView(); loseLife(); 
            }, (openDur + endDur) * 1000);
        }
    }

    function updateBoardView() {
        const cells = gridEl.children;
        const totalCells = currentGridSize * currentGridSize;
        if(cells.length === 0) return;
        let xSize = currentGridSize >= 8 ? 32 : 50;
        let errSize = currentGridSize >= 8 ? 40 : 60;

        for (let i = 0; i < totalCells; i++) {
            const r = Math.floor(i / currentGridSize); const c = i % currentGridSize;
            const state = playerState[r][c]; const cell = cells[i];
            if (cell.dataset.state != state) {
                cell.dataset.state = state; cell.innerHTML = '';
                if (state === 1) cell.innerHTML = `<span class="mark-x" style="font-size: ${xSize}px;">×</span>`;
                else if (state === 3) cell.innerHTML = `<span class="mark-error" style="font-size: ${errSize}px;">×</span>`;
            }
        }
    }

    function shootConfetti(cell) {
        const rect = cell.getBoundingClientRect(); const appRect = document.getElementById('app').getBoundingClientRect();
        const centerX = rect.left - appRect.left + rect.width / 2; const centerY = rect.top - appRect.top + rect.height / 2;
        const colors =['#f2a2c0', '#74c2f2', '#ebd160', '#4dbfa3', '#d96880', '#ffffff'];
        for (let i = 0; i < 45; i++) {
            const p = document.createElement('div'); p.className = 'confetti-particle';
            p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            p.style.left = centerX + 'px'; p.style.top = centerY + 'px';
            const angle = Math.random() * Math.PI * 2; const velocity = 60 + Math.random() * 80; 
            p.style.setProperty('--tx', Math.cos(angle) * velocity + 'px');
            p.style.setProperty('--ty', Math.sin(angle) * velocity - 40 + 'px');
            p.style.setProperty('--rot', Math.random() * 720 + 360 + 'deg');
            document.getElementById('app').appendChild(p);
            setTimeout(() => p.remove(), 800);
        }
    }

    function loseLife() {
        const currentSession = currentSessionId;
        lives--;
        const hearts = document.querySelectorAll('.heart');
        if (lives >= 0) hearts[lives].style.opacity = '0.2';
        if (lives === 0) setTimeout(() => {
            if (currentSession !== currentSessionId) return; 
            
            document.getElementById('fail-screen').style.display = 'flex';
            if (failSpineInstance) {
                failSpineInstance.visible = true;
                // 播放一次，停在最后一帧
                safePlaySpine(failSpineInstance, 0, 'nohappy', false, 0); 
            }
        }, 300);
    }

    function checkWin() {
        const currentSession = currentSessionId;
        document.getElementById('thief-counter').innerText = thievesRemaining;
        if (thievesRemaining === 0 && lives > 0) {
            setTimeout(() => {
                if (currentSession !== currentSessionId) return; 
                
                document.getElementById('victory-screen').style.display = 'flex';
                totalCoins += 200;
                document.getElementById('total-coins').innerText = totalCoins;
                
                if (victorySpineInstance) {
                    victorySpineInstance.visible = true;
                    // 播放一次，停在最后一帧
                    safePlaySpine(victorySpineInstance, 0, 'happy', false, 0); 
                }
            }, 600); 
        }
    }

    function retryLevel() {
        loadLevel(currentLevelIndex);
    }

    function nextLevel() {
        currentLevelIndex++;
        loadLevel(currentLevelIndex);
    }

    document.getElementById('total-coins').innerText = totalCoins;
    initPixiAndSpine();
</script>
</body>
</html>
